<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VexUI Source Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #0f141b;
      --page-2: #151b24;
      --panel: #1a2330;
      --panel-hi: #223040;
      --line: #33465b;
      --text: #edf5fc;
      --muted: #9fb1c3;
      --accent: #4da3ff;
      --ok: #63d9a5;
      --warn: #e6b65c;
      --danger: #e36c7a;
      --vui-bg: #15273c;
      --vui-surface: #1b3048;
      --vui-surface-hi: #233850;
      --vui-border: #39506a;
      --vui-border-hi: #5a7da3;
      --vui-text: #eaf2fa;
      --vui-text-dim: #b7c7d8;
      --vui-menu-bg: #0c1b2a;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--page), #0b1016);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid #263544;
      background: rgba(15, 20, 27, 0.94);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .bar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 34px;
      height: 34px;
      border: 1px solid #5d7896;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #dbefff;
      background: #172a40;
      font-weight: 800;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 760;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    button, .file-btn, select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #202b38;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 13px;
    }

    button, .file-btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    button:hover, .file-btn:hover, select:hover {
      border-color: #59748e;
      background: #263443;
    }

    .primary {
      background: var(--accent);
      border-color: transparent;
      color: #06111d;
      font-weight: 760;
    }

    .primary:hover {
      background: #67b2ff;
      border-color: transparent;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 16px 18px 22px;
      display: grid;
      grid-template-columns: minmax(340px, 0.9fr) minmax(520px, 1.1fr);
      gap: 16px;
    }

    .pane {
      min-width: 0;
      border: 1px solid #273746;
      border-radius: 8px;
      background: rgba(21, 27, 36, 0.78);
      overflow: hidden;
    }

    .pane-head {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid #273746;
      background: rgba(26, 35, 48, 0.9);
    }

    .pane-title {
      font-size: 13px;
      font-weight: 760;
      color: #dce9f5;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    #fileSelect {
      max-width: 260px;
      min-height: 30px;
      font-size: 12px;
      padding: 0 8px;
    }

    textarea {
      width: 100%;
      height: calc(100vh - 176px);
      min-height: 520px;
      display: block;
      resize: vertical;
      border: 0;
      outline: none;
      padding: 14px;
      color: #d9ecff;
      background: #0b1118;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      tab-size: 4;
    }

    .preview-wrap {
      min-height: calc(100vh - 176px);
      display: grid;
      grid-template-rows: minmax(420px, 1fr) auto;
    }

    .stage {
      overflow: auto;
      padding: 24px;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
        #101821;
      background-size: 24px 24px;
    }

    .desktop {
      min-width: 760px;
      min-height: 520px;
      position: relative;
      border: 1px solid #23364a;
      border-radius: 8px;
      overflow: hidden;
      background: radial-gradient(circle at 28% 18%, #223a54 0 18%, transparent 36%),
                  linear-gradient(135deg, #102035, #111827 54%, #0b1420);
      box-shadow: var(--shadow);
    }

    .os-topbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      color: #e8f3ff;
      background: rgba(9, 18, 29, 0.76);
      border-bottom: 1px solid rgba(160, 198, 228, 0.18);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .os-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #a9bfd4;
    }

    .v-window {
      position: absolute;
      left: 96px;
      top: 76px;
      border: 1px solid rgba(92, 126, 160, 0.74);
      border-radius: 8px;
      background: rgba(13, 24, 37, 0.92);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.44);
      overflow: hidden;
    }

    .v-titlebar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      background: linear-gradient(#20334a, #172638);
      border-bottom: 1px solid rgba(84, 116, 150, 0.65);
      color: #ecf6ff;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .v-appicon {
      width: 20px;
      height: 20px;
      border: 1px solid #5a7da3;
      border-radius: 4px;
      display: grid;
      place-items: center;
      color: #dcefff;
      background: #0d1b2b;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .v-controls {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .v-control {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid #6f88a0;
      opacity: 0.82;
    }

    .v-content {
      position: relative;
      overflow: hidden;
      background: var(--vui-bg);
      font: 12px/16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--vui-text);
    }

    .wd {
      position: absolute;
      white-space: nowrap;
      letter-spacing: 0;
    }

    .wd-label {
      color: var(--vui-text);
      line-height: 16px;
      overflow: hidden;
    }

    .wd-panel, .wd-card, .wd-pill, .wd-button, .wd-pillbtn, .wd-input, .wd-badge, .wd-metric {
      border-style: solid;
      border-width: 1px;
    }

    .wd-panel {
      border-radius: 5px;
      border-color: var(--vui-border);
      background: var(--vui-surface);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.06);
    }

    .wd-panel-title {
      position: absolute;
      left: 1px;
      right: 1px;
      top: 1px;
      height: 22px;
      background: var(--vui-surface-hi);
      border-bottom: 1px solid var(--vui-border);
      color: var(--vui-text);
      padding: 3px 10px 0 16px;
    }

    .wd-panel-title::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 5px;
      width: 3px;
      height: 12px;
      background: var(--accent);
    }

    .wd-card, .wd-metric {
      border-radius: 5px;
      border-color: rgba(207, 226, 245, 0.24);
      background: var(--vui-surface);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.055);
    }

    .wd-card-title {
      position: absolute;
      left: 12px;
      top: 9px;
      color: var(--vui-text-dim);
    }

    .wd-button {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      border-color: color-mix(in srgb, var(--vui-border), var(--accent) 34%);
      background: var(--vui-surface-hi);
      color: color-mix(in srgb, var(--vui-text-dim), var(--accent) 34%);
      overflow: hidden;
    }

    .wd-pillbtn {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border-color: color-mix(in srgb, var(--vui-surface), #cfe2f5 34%);
      background: color-mix(in srgb, var(--vui-surface), #ffffff 6%);
      color: var(--vui-text-dim);
    }

    .wd-input {
      border-radius: 5px;
      border-color: var(--vui-border);
      background: color-mix(in srgb, var(--vui-bg), #000 34%);
      color: var(--vui-text-dim);
      padding: 8px 10px 0 28px;
      overflow: hidden;
    }

    .wd-input::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 12px;
      width: 7px;
      height: 7px;
      border: 1px solid var(--vui-text-dim);
      border-radius: 50%;
      opacity: 0.8;
    }

    .wd-input::after {
      content: "";
      position: absolute;
      left: 18px;
      top: 20px;
      width: 7px;
      height: 1px;
      background: var(--vui-text-dim);
      transform: rotate(45deg);
      transform-origin: left center;
      opacity: 0.8;
    }

    .wd-badge {
      display: flex;
      align-items: center;
      padding: 0 9px;
      border-radius: 5px;
      border-color: color-mix(in srgb, var(--vui-surface), currentColor 25%);
      background: color-mix(in srgb, var(--vui-surface), currentColor 10%);
      color: var(--accent);
      overflow: hidden;
    }

    .wd-tabs {
      border-bottom: 1px solid var(--vui-border);
      display: flex;
      overflow: hidden;
    }

    .wd-tab {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--vui-text-dim);
      height: 100%;
      min-width: 0;
      overflow: hidden;
    }

    .wd-tab.active {
      color: var(--vui-text);
    }

    .wd-tab.active::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: -1px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
    }

    .wd-bar {
      border-radius: 999px;
      background: color-mix(in srgb, var(--vui-surface), #fff 13%);
      overflow: hidden;
    }

    .wd-bar-fill {
      height: 100%;
      min-width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent), var(--vui-surface) 20%), var(--accent));
    }

    .wd-pill {
      border-radius: 10px;
      border-color: color-mix(in srgb, var(--vui-surface), #cfe2f5 34%);
      background: var(--vui-surface);
    }

    .wd-spark svg, .wd-metric svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .wd-tile {
      border-radius: 4px;
      border: 1px solid color-mix(in srgb, var(--vui-surface), #cfe2f5 50%);
      color: var(--vui-text-dim);
      display: grid;
      place-items: center;
    }

    .wd-metric-title {
      position: absolute;
      left: 14px;
      top: 10px;
      color: var(--vui-text-dim);
    }

    .wd-metric-value {
      position: absolute;
      left: 14px;
      top: 28px;
      color: var(--accent);
      font-size: 24px;
      line-height: 32px;
      transform-origin: left top;
    }

    .wd-metric-sub {
      position: absolute;
      left: 14px;
      bottom: 2px;
      color: var(--vui-text-dim);
    }

    .metric-viz {
      position: absolute;
      left: 50%;
      right: 14px;
      top: 28px;
      height: 28px;
    }

    .metric-progress {
      position: absolute;
      left: 50%;
      right: 14px;
      top: 34px;
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--vui-surface), #fff 10%);
      overflow: hidden;
    }

    .metric-progress > div {
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
    }

    .wd-menubar {
      background: var(--vui-surface);
      border-bottom: 1px solid var(--vui-border);
      overflow: hidden;
    }

    .wd-menu {
      height: 22px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      color: var(--vui-text-dim);
    }

    .wd-menu:first-child {
      color: var(--vui-text);
      background: color-mix(in srgb, var(--accent), var(--vui-surface) 84%);
    }

    .raw-canvas-preview {
      position: absolute;
      inset: 0;
      background: #101620;
      color: #d6e2f2;
      font: 12px/16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .raw-browser-bar {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      background: #1d2740;
      border-bottom: 1px solid #30445f;
    }

    .raw-browser-btn {
      width: 28px;
      height: 24px;
      display: grid;
      place-items: center;
      background: #243350;
      color: #8396ad;
    }

    .raw-url {
      height: 24px;
      flex: 1;
      padding: 4px 8px 0;
      background: #273f6b;
      color: #d6e2f2;
      overflow: hidden;
    }

    .raw-status {
      height: 22px;
      padding: 3px 12px 0;
      background: #1d2740;
      color: #8396ad;
      border-bottom: 1px solid #26384f;
    }

    .raw-page {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 58px;
      bottom: 12px;
      background: #f7f8fc;
      color: #263241;
      padding: 18px;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif;
      line-height: 1.35;
    }

    .raw-page h2 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.2;
      color: #15243a;
    }

    .raw-page p {
      margin: 0 0 8px;
      color: #526173;
    }

    .diagnostics {
      border-top: 1px solid #273746;
      background: #0b1118;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .diag-box {
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid #243343;
      border-radius: 7px;
      background: #101822;
    }

    .diag-box strong {
      display: block;
      margin-bottom: 5px;
      color: #dbe9f5;
      font-size: 12px;
    }

    .diag-list {
      max-height: 92px;
      overflow: auto;
      font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      textarea { height: 50vh; min-height: 360px; }
      .preview-wrap { min-height: 560px; }
      .diagnostics { grid-template-columns: 1fr; }
      .bar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="bar">
        <div class="brand">
          <div class="mark">V</div>
          <div>
            <h1>VexUI Source Preview</h1>
            <div class="subtitle">Static C/C++ parser plus a browser implementation of the VibeOS VexUI widget renderer.</div>
          </div>
        </div>
        <div class="actions">
          <select id="exampleSelect" aria-label="Example source">
            <option value="uidemo">uidemo.c</option>
            <option value="sysinfo">sysinfo.cpp</option>
            <option value="showcase">widget showcase</option>
          </select>
          <label class="file-btn" for="fileInput">Load Sources</label>
          <input id="fileInput" type="file" accept=".c,.cc,.cpp,.h,.hpp,.txt" multiple>
          <button id="parseBtn" class="primary" type="button">Render</button>
        </div>
      </div>
    </header>
    <main>
      <section class="pane">
        <div class="pane-head">
          <div class="pane-title">App Source</div>
          <div class="source-tools">
            <select id="fileSelect" aria-label="Loaded source file"></select>
            <div class="hint" id="sourceHint">Paste or load a VexUI app using `vui_*` calls</div>
          </div>
        </div>
        <textarea id="source"></textarea>
      </section>
      <section class="pane">
        <div class="pane-head">
          <div class="pane-title">Optical Reconstruction</div>
          <div class="hint" id="windowHint">No source parsed yet</div>
        </div>
        <div class="preview-wrap">
          <div class="stage">
            <div class="desktop">
              <div class="os-topbar">
                <strong>VibeOS</strong>
                <span id="osMenu">App</span>
                <div class="os-status"><span>NET</span><span>CPU 12%</span><span>MEM 34%</span></div>
              </div>
              <div id="window" class="v-window">
                <div class="v-titlebar">
                  <div class="v-appicon" id="appIcon">A</div>
                  <div id="titleText">App</div>
                  <div class="v-controls"><span class="v-control"></span><span class="v-control"></span><span class="v-control"></span></div>
                </div>
                <div id="content" class="v-content"></div>
              </div>
            </div>
          </div>
          <div class="diagnostics">
            <div class="diag-box">
              <strong>Parsed</strong>
              <div class="diag-list" id="parsedStats"></div>
            </div>
            <div class="diag-box">
              <strong>Recognized Calls</strong>
              <div class="diag-list" id="callList"></div>
            </div>
            <div class="diag-box">
              <strong>Notes</strong>
              <div class="diag-list" id="notes"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THEME = {
      bg: '#15273c',
      surface: '#1b3048',
      surfaceHi: '#233850',
      border: '#39506a',
      borderHi: '#5a7da3',
      text: '#eaf2fa',
      textDim: '#b7c7d8',
      accent: '#4da3ff',
      ok: '#63d9a5',
      warn: '#e6b65c',
      danger: '#e36c7a',
      menuBg: '#0c1b2a'
    };

    const CONSTANTS = {
      VUI_BG: THEME.bg,
      VUI_PANEL: '#1f2942',
      VUI_ACCENT: THEME.accent,
      VUI_ACCENT_DIM: '#5a4f93',
      VUI_TEXT: '#e6edf7',
      VUI_TEXT_DIM: '#9aa7ba',
      VUI_BORDER: '#344259',
      VUI_OK: THEME.ok,
      VUI_WARN: THEME.warn,
      VUI_DANGER: THEME.danger,
      VUI_COLOR_TRANSPARENT: '#ff00ff',
      VUI_ANCHOR_LEFT: 1,
      VUI_ANCHOR_TOP: 2,
      VUI_ANCHOR_RIGHT: 4,
      VUI_ANCHOR_BOTTOM: 8,
      VUI_WINDOW_FRAMELESS: 1,
      VUI_WINDOW_NO_DOCK: 2,
      VUI_WINDOW_POSITIONED: 4,
      VUI_WINDOW_ALWAYS_ON_TOP: 8,
      VUI_WINDOW_TRANSLUCENT: 16
    };

    const EXAMPLES = {
      uidemo: `/* uidemo - example VibeOS GUI app (retained mode). */
#include "vexui.h"

static vui_widget *g_counter;
static vui_widget *g_bar;
static int g_clicks;

static void on_increment(vui_widget *self) {
    (void)self;
    g_clicks++;
    vui_set_int(g_counter, g_clicks);
    vui_set_value(g_bar, g_clicks % 11);
}

static void on_reset(vui_widget *self) {
    (void)self;
    g_clicks = 0;
    vui_set_int(g_counter, 0);
    vui_set_value(g_bar, 0);
}

void __attribute__((noreturn)) _start(void) {
    vui_window *win = vui_window_open("UI Demo", 360, 230);
    vui_widget *b1;
    vui_widget *b2;

    vui_label(win, 16, 10, "VEXUI TOOLKIT (RETAINED MODE)");

    vui_set_anchor(vui_panel(win, 16, 36, 328, 96, "Buttons"), VUI_ANCHOR_LEFT | VUI_ANCHOR_TOP | VUI_ANCHOR_RIGHT);
    b1 = vui_button(win, 28, 66, "Increment");
    vui_on_click(b1, on_increment);
    b2 = vui_button(win, 170, 66, "Reset");
    vui_on_click(b2, on_reset);

      if (name === 'vui_menubar') wd = newWidget('menubar', { x: 0, y: 0, w: model.width, h: 22, anchors: 7 });
      if (name === 'vui_menu') wd = newWidget('menu', { text: v(2) || '', w: textWidth(v(2) || '') + 16, h: 22, parent: model.widgets.indexOf(v(1)) });
      if (name === 'vui_menuitem') wd = newWidget('menuitem', { text: v(2) || '', parent: model.widgets.indexOf(v(1)) });

    }

    function applySetter(model, name, args, vars) {
      const target = evalExpr(args[0], vars);
      if (!target || typeof target !== 'object') return false;
      const v = (i) => evalExpr(args[i], vars);

      if (name === 'vui_set_user') { target.user = v(1); return true; }

      if (name === 'vui_set_text' || name === 'vui_set_int') {

      if (name === 'vui_set_padding') { target.padding = Number(v(1) || 0); return true; }

      if (name === 'vui_set_expand') { target.expand = true; return true; }

    }

    function parseSource(source, files = new Map(), rootName = 'input.c') {
      const tu = buildTranslationUnit(source, files, rootName);
      source = tu.source;
      const vars = extractScalars(source);
      const model = { title: 'App', width: 420, height: 300, widgets: [], calls: [], notes: [], functions: extractFunctions(source), vars, files: [...files.keys()], missingIncludes: tu.missing, frameless: false, clearColor: THEME.bg, dockEntries: extractDockEntries(source) };
      vars.set('__model', model);
      vars.set('__dockEntries', model.dockEntries);
      if (tu.missing.length) model.notes.push(`Missing includes:\n${tu.missing.join('\n')}`);
      const entryName = model.functions.has('_start') ? '_start' : (model.functions.has('main') ? 'main' : '');
      const entryBody = entryName ? model.functions.get(entryName).body : source;
      model.entryName = entryName || '(whole source)';
      model.rawCanvas = detectRawCanvasApp(source, entryBody);
      if (model.rawCanvas) {
        model.title = model.rawCanvas.title;
        model.width = 640;
        model.height = 420;
        model.calls.push(...model.rawCanvas.calls);
      }
      const creationNames = new Set(['vui_panel','vui_card','vui_label','vui_button','vui_pill_button','vui_tile_button','vui_input','vui_badge','vui_tabs','vui_bar','vui_sparkline','vui_pill','vui_metric','vui_vbox','vui_hbox','vui_menubar','vui_menu','vui_menuitem','vui_menu_separator']);
      const setterNames = new Set(['vui_set_anchor','vui_set_color','vui_set_user','vui_set_clear_color','vui_set_value','vui_set_text','vui_set_int','vui_set_text_scale','vui_set_metric','vui_metric_push','vui_set_bounds','vui_set_size','vui_set_button_width','vui_set_visible','vui_set_gap','vui_set_padding','vui_set_fill','vui_set_expand']);
      function handleCall(call) {
        model.calls.push(call.name);
        const assign = call.prefix.match(/(?:^|[\s\*\)])([A-Za-z_][A-Za-z0-9_]*)\s*=\s*$/);
        if (call.name === 'vui_window_open' || call.name === 'vui_window_open_ex') {
          model.title = String(evalExpr(call.args[0], vars) || 'App');
          model.width = Number(evalExpr(call.args[1], vars) || 420);
          model.height = Number(evalExpr(call.args[2], vars) || 300);
          if (call.name === 'vui_window_open_ex') {
            const flags = Number(evalExpr(call.args[3], vars) || 0);

            model.frameless = !!(flags & CONSTANTS.VUI_WINDOW_FRAMELESS);
            model.windowX = Number(evalExpr(call.args[4], vars) || 96);

        }
        if (setterNames.has(call.name)) {

        const calls = extractCalls(statement);
        if (factoryAssign && !calls.length) {
          const value = evalExpr(factoryAssign[2], vars);

        }
        for (const call of calls) handleCall(call);
      }
      if (!model.widgets.length) {
        if (model.rawCanvas) {
          model.notes.push('This app does not use VexUI. It creates a window and presents its own pixel buffer, so a 1:1 preview would need a separate canvas renderer for that app.');
        } else {
          model.notes.push('No VexUI widget creation calls were found.');
        }

      return model;
    }

    function layout(model) {
      for (const wd of model.widgets) {
        if (wd.parent !== null && wd.parent !== undefined && wd.parent >= 0) continue;
        const right = model.width - wd.marginR;
        const bottom = model.height - wd.marginB;
        if ((wd.anchors & 1) && (wd.anchors & 4)) { wd.x = wd.marginL; wd.w = Math.max(1, right - wd.x); }
        else if (wd.anchors & 4) wd.x = right - wd.w;
        else wd.x = wd.marginL;
        if ((wd.anchors & 2) && (wd.anchors & 8)) { wd.y = wd.marginT; wd.h = Math.max(1, bottom - wd.y); }
        else if (wd.anchors & 8) wd.y = bottom - wd.h;
        else wd.y = wd.marginT;
      }
      model.widgets.forEach((wd, idx) => {
        if (wd.type !== 'vbox' && wd.type !== 'hbox') return;
        const children = model.widgets.filter(ch => ch.parent === idx);
        if (!children.length) return;
        const horiz = wd.type === 'hbox';
        const fixed = children.reduce((n, ch) => n + (ch.expand ? 0 : (horiz ? ch.w : ch.h)), 0);
        const expands = children.filter(ch => ch.expand).length;
        const mainInner = Math.max(0, (horiz ? wd.w : wd.h) - 2 * wd.padding);
        const crossInner = Math.max(0, (horiz ? wd.h : wd.w) - 2 * wd.padding);
        const share = expands ? Math.max(0, mainInner - fixed - (children.length - 1) * wd.gap) / expands : 0;
        let cursor = (horiz ? wd.x : wd.y) + wd.padding;
        for (const ch of children) {
          const main = ch.expand ? share : (horiz ? ch.w : ch.h);
          const cross = ch.fill ? crossInner : (horiz ? ch.h : ch.w);
          if (horiz) { ch.x = cursor; ch.y = wd.y + wd.padding; ch.w = main; ch.h = cross; }
          else { ch.x = wd.x + wd.padding; ch.y = cursor; ch.w = cross; ch.h = main; }

        }

        let x = wd.x + 4;
        for (const m of model.widgets.filter(ch => ch.type === 'menu' && ch.parent === idx)) {
          m.x = x; m.y = wd.y; m.w = textWidth(m.text) + 16; m.h = wd.h;

        }
      });
    }

    function applyScalarStatement(model, statement) {
      let m = statement.match(/\b([A-Za-z_][A-Za-z0-9_]*)\s*\+\+\s*;?$/);
      if (m && model.vars.has(m[1]) && typeof model.vars.get(m[1]) === 'number') {
        model.vars.set(m[1], model.vars.get(m[1]) + 1);
        return true;
      }
      m = statement.match(/\+\+\s*([A-Za-z_][A-Za-z0-9_]*)\s*;?$/);
      if (m && model.vars.has(m[1]) && typeof model.vars.get(m[1]) === 'number') {
        model.vars.set(m[1], model.vars.get(m[1]) + 1);
        return true;
      }
      m = statement.match(/\b([A-Za-z_][A-Za-z0-9_]*)\s*\+=\s*(.+?)\s*;?$/);
      if (m && model.vars.has(m[1]) && typeof model.vars.get(m[1]) === 'number') {
        model.vars.set(m[1], model.vars.get(m[1]) + Number(evalExpr(m[2], model.vars) || 0));
        return true;
      }
      m = statement.match(/\b([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.+?)\s*;?$/);
      if (m && model.vars.has(m[1]) && typeof model.vars.get(m[1]) === 'number') {

      }

    function executeCallback(model, fnName) {
      const fn = model.functions.get(fnName);

    function setBox(el, wd) {
      el.classList.add('wd');
      el.style.left = `${Math.round(wd.x)}px`;
      el.style.top = `${Math.round(wd.y)}px`;
      el.style.width = `${Math.round(wd.w)}px`;
      el.style.height = `${Math.round(wd.h)}px`;
      if (typeof wd.color === 'string') el.style.color = wd.color;
    }

    function renderWidget(wd, idx, model) {

      const el = document.createElement('div');
      setBox(el, wd);
      if (wd.type === 'vbox' || wd.type === 'hbox') {
        if (wd.color && wd.color !== CONSTANTS.VUI_TEXT) {
          el.style.background = wd.color;
        } else {
          return null;
        }
      }
      if (wd.type === 'panel') {
        el.className += ' wd-panel';
        if (wd.text) {
          const t = document.createElement('div');
          t.className = 'wd-panel-title';
          t.textContent = wd.text;
          el.appendChild(t);
        }
      }
      if (wd.type === 'card') {
        el.className += ' wd-card';
        if (wd.text) {
          const t = document.createElement('div');
          t.className = 'wd-card-title';
          t.textContent = wd.text;
          el.appendChild(t);
        }
      }
      if (wd.type === 'label') {
        el.className += ' wd-label';
        el.textContent = wd.text;
        el.style.color = wd.color || CONSTANTS.VUI_TEXT;
        const scale = Math.max(1, Number(wd.value || 1));
        if (scale > 1) {
          el.style.fontSize = `${12 * scale}px`;
          el.style.lineHeight = `${16 * scale}px`;
        }
      }
      if (wd.type === 'button') { el.className += ' wd-button'; el.textContent = wd.text; if (wd.color) el.style.setProperty('--accent', wd.color); }
      if (wd.type === 'pillbtn') { el.className += ' wd-pillbtn'; el.textContent = wd.text; if (wd.color) el.style.setProperty('--accent', wd.color); }
      if (wd.type === 'input') { el.className += ' wd-input'; el.textContent = wd.text || wd.title; }
      if (wd.type === 'badge') { el.className += ' wd-badge'; el.textContent = wd.text; el.style.color = wd.color || THEME.accent; }
      if (wd.type === 'tabs') {
        el.className += ' wd-tabs';
        const labels = String(wd.text || '').split('|');
        labels.forEach((label, i) => {
          const tab = document.createElement('div');
          tab.className = 'wd-tab' + (i === wd.value ? ' active' : '');
          tab.style.width = `${100 / Math.max(1, labels.length)}%`;
          tab.textContent = label;
          el.appendChild(tab);
        });
      }
      if (wd.type === 'bar') {
        el.className += ' wd-bar';
        const fill = document.createElement('div');
        fill.className = 'wd-bar-fill';
        fill.style.width = `${Math.max(0, Math.min(100, wd.value * 100 / wd.max))}%`;
        if (wd.color) fill.style.background = `linear-gradient(90deg, ${wd.color}, ${wd.color})`;
        el.appendChild(fill);
      }
      if (wd.type === 'spark') {
        el.className += ' wd-spark';
        el.innerHTML = sparkSvg(wd.w, wd.h, wd.color || THEME.accent);

      if (wd.type === 'pill') { el.className += ' wd-pill'; if (wd.color) el.style.background = wd.color; }
      if (wd.type === 'tile') {

        el.className += ' wd-metric';

        t.className = 'wd-metric-title';
        t.textContent = wd.title;
        const val = document.createElement('div');
        val.className = 'wd-metric-value';
        val.textContent = wd.text || '0';
        val.style.color = wd.color || THEME.accent;
        const sub = document.createElement('div');
        sub.className = 'wd-metric-sub';
        sub.textContent = wd.sub || '';

        if (wd.max === 1) {
          const p = document.createElement('div');
          p.className = 'metric-progress';
          const f = document.createElement('div');
          f.style.width = `${Math.max(0, Math.min(100, wd.value))}%`;
          f.style.background = wd.color || THEME.accent;
          p.appendChild(f);
          el.appendChild(p);

      if (wd.type === 'menubar') {
        el.className += ' wd-menubar';

          const item = document.createElement('div');
          item.className = 'wd-menu';
          item.style.width = `${m.w}px`;
          item.textContent = m.text;
          el.appendChild(item);

        el.style.cursor = 'pointer';

    function sparkSvg(w, h, color) {
      const pat = [3,5,4,6,5,7,6,8,7,9,7,6,5,7,8,6];
      const pts = pat.map((v, i) => `${i * (w - 1) / (pat.length - 1)},${(h - 2) - v * (h - 3) / 10}`).join(' ');
      return `<svg viewBox="0 0 ${Math.max(1, w)} ${Math.max(1, h)}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
    }

    function tileIconSvg(icon, color, fallback) {
      const stroke = `stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"`;
      if (icon === 1) return `<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" ${stroke}/><path d="M2 14h24M14 2v24M6 7c4 3 12 3 16 0M6 21c4-3 12-3 16 0" ${stroke}/></svg>`;
      if (icon === 2) return `<svg width="28" height="28" viewBox="0 0 28 28"><rect x="3" y="4" width="22" height="16" rx="1" ${stroke}/><path d="M11 24h6M14 20v4M6 15l4-4 4 3 5-7 3 4" ${stroke}/></svg>`;
      if (icon === 3) return `<svg width="28" height="28" viewBox="0 0 28 28"><rect x="4" y="4" width="8" height="8" ${stroke}/><rect x="16" y="4" width="8" height="8" ${stroke}/><rect x="4" y="16" width="8" height="8" ${stroke}/><rect x="16" y="16" width="8" height="8" ${stroke}/></svg>`;
      if (icon === 4) return `<svg width="28" height="28" viewBox="0 0 28 28"><path d="M11 7 4 14l7 7M17 7l7 7-7 7" ${stroke}/></svg>`;
      if (icon === 5) return `<svg width="28" height="28" viewBox="0 0 28 28"><path d="M3 9h9l2 3h11v12H3zM3 9V6h8l2 3" ${stroke}/></svg>`;
      return fallback || '';
    }

    function areaSvg(samples, color) {
      const w = 100, h = 28;
      const pts = samples.map((v, i) => [i * (w - 1) / (samples.length - 1), (h - 1) - Math.max(0, Math.min(100, v)) * (h - 2) / 100]);
      const line = pts.map(p => p.join(',')).join(' ');
      const area = `0,${h} ${pts.map(p => p.join(',')).join(' ')} ${w},${h}`;
      return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polygon points="${area}" fill="${color}" opacity="0.22"/><polyline points="${line}" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
    }

    function renderModel(model) {
      currentModel = model;
      contentEl.replaceChildren();
      windowEl.style.width = `${model.width}px`;
      windowEl.style.height = `${model.height + (model.frameless ? 0 : 34)}px`;
      windowEl.style.left = `${Number.isFinite(model.windowX) ? model.windowX : 96}px`;
      windowEl.style.top = `${Number.isFinite(model.windowY) ? model.windowY : 76}px`;
      document.querySelector('.v-titlebar').style.display = model.frameless ? 'none' : 'flex';
      contentEl.style.width = `${model.width}px`;
      contentEl.style.height = `${model.height}px`;
      contentEl.style.background = model.clearColor === CONSTANTS.VUI_COLOR_TRANSPARENT ? 'transparent' : (model.clearColor || THEME.bg);
      windowEl.style.background = model.frameless ? 'transparent' : 'rgba(13, 24, 37, 0.92)';
      windowEl.style.borderColor = model.frameless ? 'transparent' : 'rgba(92, 126, 160, 0.74)';
      windowEl.style.boxShadow = model.frameless ? 'none' : '0 18px 42px rgba(0, 0, 0, 0.44)';
      titleText.textContent = model.title;
      appIcon.textContent = (model.title || 'A').trim().slice(0, 1).toUpperCase();
      windowHint.textContent = `${model.title} · ${model.width}x${model.height} · ${model.widgets.length} widgets`;
      const menus = model.widgets.filter(w => w.type === 'menu').map(w => w.text);
      osMenu.textContent = menus.length ? menus.join('  ') : 'App';
      if (model.rawCanvas && !model.widgets.length) {
        const raw = document.createElement('div');
        raw.className = 'raw-canvas-preview';
        raw.innerHTML = `
          <div class="raw-browser-bar">
            <div class="raw-browser-btn">&lt;</div>
            <div class="raw-browser-btn">&gt;</div>
            <div class="raw-url">example.com</div>
          </div>
          <div class="raw-status">Raw canvas renderer detected: ${model.rawCanvas.calls.join(', ')}</div>
          <div class="raw-page">
            <h2>${model.rawCanvas.title}</h2>
            <p>This app bypasses VexUI and paints pixels directly.</p>
            <p>The preview can identify the window/canvas pipeline, but reproducing the full app means simulating its custom render() code.</p>
          </div>`;
        contentEl.appendChild(raw);
      }
      for (let i = 0; i < model.widgets.length; i++) {
        const node = renderWidget(model.widgets[i], i, model);
        if (node) contentEl.appendChild(node);
      }
      parsedStats.textContent = [
        `window: ${model.title}`,
        `content: ${model.width} x ${model.height}`,
        `widgets: ${model.widgets.length}`,
        `menus: ${menus.length}`,
        `callbacks: ${model.widgets.filter(w => w.onClick).length}`,
        `entry: ${entryFile || 'input.c'} :: ${model.entryName || ''}`,
        `files: ${model.files.length || 1}`
      ].join('\n');
      callList.textContent = [...new Set(model.calls)].join('\n') || 'none';
      notes.textContent = (model.notes.length ? model.notes : [
        'Click widgets that use vui_on_click() to simulate their callback.',
        'Runtime support covers simple integer state, ++, +=, =, arithmetic, and common vui_set_* calls.'
      ]).join('\n');
    }

    function parseAndRender() {
      renderModel(parseSource(sourceEl.value, projectFiles, entryFile || 'input.c'));
    }

    parseBtn.addEventListener('click', parseAndRender);
    sourceEl.addEventListener('input', () => {
      if (projectFiles.size && fileSelect.value) projectFiles.set(fileSelect.value, sourceEl.value);
      clearTimeout(sourceEl._timer);
      sourceEl._timer = setTimeout(parseAndRender, 350);
    });
    fileSelect.addEventListener('change', () => {
      if (!projectFiles.size) return;
      sourceEl.value = projectFiles.get(fileSelect.value) || '';
      sourceHint.textContent = fileSelect.value === entryFile
        ? `${fileSelect.value} is the entry file`
        : `${fileSelect.value} is loaded for include/helper resolution`;
    });
    exampleSelect.addEventListener('change', () => {
      projectFiles = new Map();
      entryFile = `${exampleSelect.value}.c`;
      refreshFileSelect();
      sourceEl.value = EXAMPLES[exampleSelect.value];
      parseAndRender();
    });
    fileInput.addEventListener('change', async () => {
      const files = [...(fileInput.files || [])];
      if (!files.length) return;
      projectFiles = new Map();
      for (const file of files) {
        const key = normalizePath(file.webkitRelativePath || file.name);
        projectFiles.set(key, await file.text());
      }
      entryFile = files.map(f => normalizePath(f.webkitRelativePath || f.name))
        .find(name => /\.(c|cc|cpp)$/i.test(name)) || normalizePath(files[0].webkitRelativePath || files[0].name);
      refreshFileSelect();
      sourceEl.value = projectFiles.get(entryFile) || '';
      exampleSelect.value = 'uidemo';
      parseAndRender();
    });

    entryFile = 'uidemo.c';
    refreshFileSelect();
    sourceEl.value = EXAMPLES.uidemo;
    parseAndRender();
  </script>
</body>
</html>
