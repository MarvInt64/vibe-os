<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VibeOS Logo</title>
  <desc id="desc">A minimal futuristic V shaped operating system logo in blue-gray and cyan.</desc>
  <defs>
    <linearGradient id="vibeGradient" x1="120" y1="72" x2="392" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CC7FF"/>
      <stop offset="0.48" stop-color="#4DA3FF"/>
      <stop offset="1" stop-color="#66E3F2"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="180" y1="140" x2="332" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF2FA" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#7CC7FF" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="softGlow" x="42" y="42" width="428" height="428" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.301 0 0 0 0 0.639 0 0 0 0 1 0 0 0 0.36 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <!-- Optional transparent canvas; logo works on dark or light backgrounds. -->
  <g filter="url(#softGlow)">
    <!-- Outer V mark -->
    <path d="M96 112L207.2 392C213.4 407.6 228.6 418 245.4 418H266.6C283.4 418 298.6 407.6 304.8 392L416 112H359.5L260.7 357.5C259 361.8 253 361.8 251.3 357.5L152.5 112H96Z" fill="url(#vibeGradient)"/>

    <!-- Inner negative-space style V cut, rendered as background-colored shape for a sharp OS-like mark -->
    <path d="M181 149L253.2 330.7C254.2 333.2 257.8 333.2 258.8 330.7L331 149H293.2L257.8 237.9C257.1 239.7 254.9 239.7 254.2 237.9L218.8 149H181Z" fill="#15273C" fill-opacity="0.94"/>

    <!-- Subtle inner highlight lines -->
    <path d="M137 132L245.7 382.2C249.5 391 262.5 391 266.3 382.2L375 132" stroke="url(#innerGradient)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity="0.58"/>
  </g>
</svg>
